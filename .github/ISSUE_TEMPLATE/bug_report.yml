name: 🐛 Bug report
description: Reporte um defeito no site ou na infra
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar! Por favor preencha os campos abaixo.
        **Vulnerabilidades de segurança NÃO devem ser abertas aqui** — siga [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: O que aconteceu?
      placeholder: Descreva o comportamento observado vs esperado.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Acesse https://nossodireito.fabiotreze.com
        2. Clique em ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Navegador / SO
      placeholder: Chrome 130 / Windows 11
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmações
      options:
        - label: Não estou reportando vulnerabilidade de segurança (essas vão por email — ver SECURITY.md)
          required: true
        - label: Não incluí dados pessoais (CPF, RG, email, nome real) na descrição
          required: true
