# NossoDireito — Descoberta Automática de Novos Benefícios PcD
# Executa mensalmente (dia 1º de cada mês) + manual.
# Busca em fontes oficiais (DOU, Senado, gov.br, LexML) por novos
# direitos, leis e serviços para PcD que ainda não estão no sistema.
# Se encontrar candidatos, cria uma issue para revisão humana.

name: Descoberta de Novos Benefícios PcD

on:
  schedule:
    # 1º de cada mês às 10:00 UTC (07:00 BRT)
    - cron: "0 10 1 * *"
  workflow_dispatch:
    inputs:
      since_days:
        description: "Buscar nos últimos N dias"
        default: "60"
        type: string
      dry_run:
        description: "Dry-run (não cria issue)"
        default: false
        type: boolean

concurrency:
  group: discover-benefits
  cancel-in-progress: true

# Top-level default: read-only (least privilege).
# Writes (issues) são concedidos apenas no job que precisa.
permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install --require-hashes --no-deps -r requirements.lock

      - name: Executar descoberta de benefícios
        id: discover
        continue-on-error: true
        run: |
          SINCE="${{ inputs.since_days || '60' }}"
          echo "🔍 Buscando novos benefícios PcD (últimos $SINCE dias)..."

          python scripts/discover_benefits.py \
            --since "$SINCE" \
            --json > discovery_output.json 2>discovery_log.txt || true

          # Exibir log
          cat discovery_log.txt

          # Extrair contadores
          TOTAL=$(jq '.candidates_found // 0' discovery_output.json 2>/dev/null || echo "0")
          ALTA=$(jq '.candidates_by_priority.ALTA // 0' discovery_output.json 2>/dev/null || echo "0")
          MEDIA=$(jq '.candidates_by_priority."MÉDIA" // 0' discovery_output.json 2>/dev/null || echo "0")
          BAIXA=$(jq '.candidates_by_priority.BAIXA // 0' discovery_output.json 2>/dev/null || echo "0")

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "alta=$ALTA" >> "$GITHUB_OUTPUT"
          echo "media=$MEDIA" >> "$GITHUB_OUTPUT"
          echo "baixa=$BAIXA" >> "$GITHUB_OUTPUT"

          if [ "$TOTAL" -gt 0 ]; then
            echo "has_candidates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_candidates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gerar relatório Markdown
        if: steps.discover.outputs.has_candidates == 'true'
        run: |
          python - <<'PY'
          import json
          from scripts.discover_benefits import generate_markdown

          with open('discovery_output.json', 'r', encoding='utf-8') as f:
              report = json.load(f)

          with open('discovery_report.md', 'w', encoding='utf-8') as f:
              f.write(generate_markdown(report))
          PY

      - name: Criar issue com candidatos
        if: steps.discover.outputs.has_candidates == 'true' && inputs.dry_run != 'true'
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9.0.0
        env:
          TOTAL: ${{ steps.discover.outputs.total }}
          ALTA: ${{ steps.discover.outputs.alta }}
          MEDIA: ${{ steps.discover.outputs.media }}
          BAIXA: ${{ steps.discover.outputs.baixa }}
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().split('T')[0];

            // Lê o relatório gerado
            let report = '';
            try {
              report = fs.readFileSync('discovery_report.md', 'utf8');
            } catch (e) {
              report = '⚠️ Erro ao gerar relatório detalhado.';
            }

            // Lê candidatos JSON para checklist
            let candidates = [];
            try {
              const json = JSON.parse(fs.readFileSync('discovery_output.json', 'utf8'));
              candidates = json.candidates || [];
            } catch (e) {}

            // Monta checklist priorizando itens acionáveis (ALTA/MÉDIA)
            const highPriorityCandidates = candidates.filter(
              (c) => c.priority === 'ALTA' || c.priority === 'MÉDIA'
            );
            const lowPriorityCount = candidates.length - highPriorityCandidates.length;

            let checklist = '\n## ✅ Checklist de Revisão\n\n';
            if (highPriorityCandidates.length === 0) {
              checklist += '- [ ] Sem itens ALTA/MÉDIA nesta execução; revisar apenas se houver contexto novo.\n';
            }

            for (const c of highPriorityCandidates) {
              const icon = c.priority === 'ALTA' ? '🔴' : c.priority === 'MÉDIA' ? '🟡' : '🟢';
              checklist += `- [ ] ${icon} **${c.title.substring(0, 80)}** (${c.source}) → \`${c.suggested_category}\`\n`;
            }

            if (lowPriorityCount > 0) {
              checklist += `\nℹ️ ${lowPriorityCount} item(ns) de prioridade BAIXA ficaram fora do checklist para reduzir ruído operacional.\n`;
            }

            const body = `${report}\n${checklist}\n---\n*Issue criada automaticamente pelo workflow de descoberta de benefícios PcD.*\n*Consulte GOVERNANCE.md para critérios de adição de novas categorias.*`;

            const alta = parseInt(process.env.ALTA) || 0;
            const labels = ['descoberta-beneficios', 'conteúdo'];
            if (alta > 0) labels.push('prioridade-alta');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🆕 ${process.env.TOTAL} novos benefícios PcD detectados — ${today}`,
              body: body,
              labels: labels
            });

            console.log(`✅ Issue criada com ${process.env.TOTAL} candidatos (${alta} ALTA).`);

      - name: Sem novidades
        if: steps.discover.outputs.has_candidates != 'true'
        run: echo "✅ Nenhum benefício novo detectado. Base de dados está atualizada!"

      - name: Upload relatório como artefato
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: discovery-report-${{ github.run_number }}
          path: |
            discovery_output.json
            discovery_report.md
            discovery_log.txt
          retention-days: 30
