# NossoDireito — LexML Law Drift (Mensal)
# Detecta alterações no TEXTO LEGAL das leis (planalto.gov.br) referenciadas
# em data/direitos.json (categorias[].base_legal[].link).
# Complementar ao conecta-govbr-sync.yml (S4) — este foca em LEIS.

name: LexML Law Drift

on:
  schedule:
    # Mensal: dia 7 às 12:00 UTC (09:00 BRT)
    - cron: "0 12 7 * *"
  workflow_dispatch:
    inputs:
      update_state:
        description: "Atualizar baseline (data/lexml_law_state.json)"
        default: false
        type: boolean
      dry_run:
        description: "Dry-run (não cria issue)"
        default: false
        type: boolean

concurrency:
  group: lexml-law-drift
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Executar drift detector
        id: drift
        continue-on-error: true
        run: |
          UPDATE_FLAG=""
          if [ "${{ inputs.update_state }}" = "true" ]; then
            UPDATE_FLAG="--update-state"
          fi

          python scripts/agent_lexml_law_drift.py --json $UPDATE_FLAG \
            > drift_output.json 2>drift_log.txt || true

          cat drift_log.txt || true

          CHANGED=$(jq '.changed // 0' drift_output.json 2>/dev/null || echo "0")
          NEW=$(jq '.new // 0' drift_output.json 2>/dev/null || echo "0")
          ERRORS=$(jq '.errors // 0' drift_output.json 2>/dev/null || echo "0")
          TOTAL=$(jq '.total // 0' drift_output.json 2>/dev/null || echo "0")
          OK=$(jq '.ok // 0' drift_output.json 2>/dev/null || echo "0")

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "ok=$OK" >> "$GITHUB_OUTPUT"

          if [ "$CHANGED" -gt 0 ] || [ "$NEW" -gt 0 ]; then
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Criar issue de drift legal
        if: steps.drift.outputs.has_drift == 'true' && inputs.dry_run != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CHANGED: ${{ steps.drift.outputs.changed }}
          NEW: ${{ steps.drift.outputs.new }}
          ERRORS: ${{ steps.drift.outputs.errors }}
          TOTAL: ${{ steps.drift.outputs.total }}
          OK: ${{ steps.drift.outputs.ok }}
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().split('T')[0];

            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('drift_output.json', 'utf8'));
            } catch (e) {
              summary = { details: { changed: [], new: [], errors: [] } };
            }
            const d = summary.details || {};
            const changed = d.changed || [];
            const newLaws = d.new || [];
            const errors = d.errors || [];

            let body = `## ⚖️ LexML Law Drift (${today})\n\n`;
            body += `Detector mensal de alterações em **texto legal** das leis referenciadas em \`data/direitos.json\`.\n\n`;
            body += `- **Total leis verificadas:** ${process.env.TOTAL}\n`;
            body += `- **OK:** ${process.env.OK}\n`;
            body += `- **🔄 Alteradas (texto mudou):** ${process.env.CHANGED}\n`;
            body += `- **✨ Novas (baseline ausente):** ${process.env.NEW}\n`;
            body += `- **❌ Erros:** ${process.env.ERRORS}\n\n`;

            if (changed.length) {
              body += `### 🔄 Leis com TEXTO alterado (revisar URGENTE)\n\n`;
              body += `Cada item: link planalto + busca LexML para verificar revogação/alteração.\n\n`;
              for (const c of changed.slice(0, 30)) {
                body += `- [ ] **${c.lei}** (${c.artigo || '—'})\n`;
                body += `  - Planalto: ${c.link}\n`;
                body += `  - LexML: ${c.lexml}\n`;
              }
              if (changed.length > 30) body += `\n_... e mais ${changed.length - 30}._\n`;
              body += '\n';
            }

            if (newLaws.length) {
              body += `### ✨ Novas leis (baseline a estabelecer)\n\n`;
              for (const c of newLaws.slice(0, 30)) {
                body += `- ${c.lei} — ${c.link}\n`;
              }
              body += '\n';
            }

            if (errors.length) {
              body += `### ❌ Erros transitórios\n\n`;
              for (const e of errors.slice(0, 15)) {
                body += `- ${e.lei}: ${e.error || e.status} (${e.url})\n`;
              }
              body += '\n';
            }

            body += `---\n`;
            body += `**Próximos passos:**\n`;
            body += `1. Para cada lei alterada: comparar texto no Planalto + buscar LexML para confirmar (alteração formal, retificação, revogação).\n`;
            body += `2. Atualizar \`data/direitos.json\` (\`base_legal\`/\`requisitos\`/etc.) se a mudança afeta direitos.\n`;
            body += `3. Refazer baseline via workflow manual com \`update_state=true\`.\n\n`;
            body += `_Issue gerada por \`scripts/agent_lexml_law_drift.py\` (cron mensal dia 7)._`;

            const labels = ['lexml-drift', 'legislação', 'sync-automatico'];
            if (parseInt(process.env.CHANGED) > 0) labels.push('lei-alterada');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚖️ LexML: ${process.env.CHANGED} lei(s) com texto alterado — ${today}`,
              body: body,
              labels: labels
            });

            console.log(`✅ Issue criada (changed=${process.env.CHANGED}, new=${process.env.NEW})`);

      - name: Sem drift legal
        if: steps.drift.outputs.has_drift == 'false'
        run: |
          echo "✅ Nenhuma lei alterada — todos os textos legais permanecem idênticos ao baseline."

      - name: Upload artefatos
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: lexml-drift-output
          path: |
            drift_output.json
            drift_log.txt
          retention-days: 60
          if-no-files-found: ignore
