name: Auto-Curation (dicas + URLs + coverage)

# Cadência semanal totalmente automatizada. Substitui revisões manuais
# pendentes (F2/issue #163/issue #164) por detecção heurística + PR
# automático (FASE A) ou comentário em issue (FASE B).
#
# Política de auto-merge:
#   - PR com remoção de BOILERPLATE em dicas[] (determinístico): auto-merge SQUASH
#     se gates verdes (schema, validate_all, link-check, testes).
#   - Comentários em issues #163/#164: atualizam estado sem ação manual.
#
# Roda toda terça 06:00 UTC (antes do content-freshness, que é segunda 05:00 UTC,
# para usar o relatório fresco dele).

on:
  schedule:
    # Terça 06:00 UTC = 03:00 BRT
    - cron: "0 6 * * 2"
  workflow_dispatch:
    inputs:
      apply_dicas:
        description: "Aplicar FASE A (boilerplate removal) e abrir PR"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: auto-curation
  cancel-in-progress: false

env:
  ISSUE_DICAS: 173
  ISSUE_URLS: 163
  ISSUE_COVERAGE: 164

jobs:
  curate:
    name: Curate content + URLs + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install npm deps
        run: npm ci

      - name: Install python deps
        run: pip install -r requirements.txt

      # ─── FASE 1: gera validation_report.json (input do resolver) ──────
      - name: Validate URLs (input for dead-url resolver)
        id: validate
        continue-on-error: true
        run: |
          python scripts/validate_sources.py --urls --json > validation_report.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      # ─── FASE 2: roda os 3 scripts de auto-curation ──────
      - name: Auto-curate dicas (F2)
        run: node scripts/auto_curate_dicas.mjs --apply

      - name: Auto-resolve dead URLs (#163)
        run: node scripts/auto_resolve_dead_urls.mjs --rate-ms=600

      - name: Audit categoria coverage (#164)
        run: node scripts/auto_audit_categoria_coverage.mjs

      # ─── FASE 3: validações antes de abrir PR ──────
      - name: Run JS tests
        run: npm run test:js

      - name: Validate schema
        run: python scripts/validate_schema.py

      - name: Validate content
        run: python scripts/validate_content.py

      # ─── FASE 4: detecta mudanças em data/direitos.json ──────
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet data/direitos.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Nenhuma mudança em data/direitos.json (FASE A não encontrou boilerplate)."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "✅ Mudanças detectadas em data/direitos.json."
            git diff --stat data/direitos.json
          fi

      # ─── FASE 5: abre PR com auto-merge SE houver mudanças ──────
      - name: Bump patch version
        if: steps.diff.outputs.has_changes == 'true'
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          for f in package.json data/direitos.json data/dicionario_pcd.json \
                   docs/ARCHITECTURE.md docs/OPERATIONS.md docs/README.md \
                   docs/SECURITY-LGPD.md GOVERNANCE.md SECURITY_AUDIT.md index.html; do
            [ -f "$f" ] && sed -i "s/${CURRENT//./\\.}/$NEW/g" "$f"
          done
          node scripts/check_version_sync.mjs

      - name: Create Pull Request (auto-merge SQUASH)
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        id: pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-curation/dicas-boilerplate
          delete-branch: true
          title: "chore(content): auto-curate dicas[] — remover boilerplate (v${{ steps.bump.outputs.new }})"
          body: |
            ## Auto-Curation Bot

            Detecção automática (semanal) removeu boilerplate prescritivo
            duplicado em `data/direitos.json#dicas[]`.

            ### O que mudou
            - Remoção de dicas idênticas repetidas em ≥3 categorias (FASE A)
            - Veja `audit_dicas_report.json` (artifact) para detalhes

            ### Validações
            - ✅ `npm run test:js`
            - ✅ `validate_schema.py`
            - ✅ `validate_content.py`
            - ✅ `check_version_sync.mjs` (bump ${{ steps.bump.outputs.current }} → ${{ steps.bump.outputs.new }})

            ### Política
            Este PR é cosmético (remove boilerplate, não conteúdo factual).
            Auto-merge SQUASH habilitado — só mergeia se todos os checks
            passarem.

            🤖 Generated by `.github/workflows/auto-curation.yml`
          commit-message: |
            chore(content): auto-curate dicas[] — remover boilerplate (v${{ steps.bump.outputs.new }})

            Detecção automática semanal — remove dicas idênticas repetidas
            em ≥3 categorias (boilerplate "Disque 100" e similares).

            Bump ${{ steps.bump.outputs.current }} → ${{ steps.bump.outputs.new }}.
          labels: |
            auto-curation
            content
          add-paths: |
            data/direitos.json
            data/dicionario_pcd.json
            package.json
            docs/*.md
            GOVERNANCE.md
            SECURITY_AUDIT.md
            index.html

      - name: Enable auto-merge (SQUASH)
        if: steps.pr.outputs.pull-request-number
        run: |
          gh pr merge ${{ steps.pr.outputs.pull-request-number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── FASE 6: comentários em issues (FASE B, sem mudança no código) ──────
      - name: Comment on issue #173 (dicas pending)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f audit_dicas_report.json ]; then
            echo "ℹ️ audit_dicas_report.json ausente — pulando comentário."
            exit 0
          fi
          # Se issue não existe, cria
          if ! gh issue view "${ISSUE_DICAS}" >/dev/null 2>&1; then
            gh issue create \
              --title "[auto-curation] dicas[] prescritivas remanescentes" \
              --label "auto-curation,content" \
              --body "Issue de tracking automatizado para dicas[] com padrões prescritivos. Atualizado semanalmente."
          fi
          REMAINING=$(jq '.summary.prescriptive_remaining' audit_dicas_report.json)
          SAMPLES=$(jq -r '.manual_candidates[:10] | .[] | "- [`\(.id)#\(.index)`] \(.dica)"' audit_dicas_report.json)
          gh issue comment "${ISSUE_DICAS}" --body "$(cat <<EOF
          ## 🤖 Auto-Curation Report — $(date -u +%Y-%m-%d)

          - Prescritivas remanescentes: **${REMAINING}**
          - Relatório completo: artifact \`audit-curation-reports-${{ github.run_number }}\`

          ### Amostra (top 10)

          ${SAMPLES}

          _Atualizado automaticamente por \`.github/workflows/auto-curation.yml\`._
          EOF
          )"

      - name: Comment on issue #163 (dead URLs)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f audit_dead_urls_report.json ]; then
            echo "ℹ️ audit_dead_urls_report.json ausente — pulando."
            exit 0
          fi
          if ! gh issue view "${ISSUE_URLS}" >/dev/null 2>&1; then
            echo "ℹ️ Issue #${ISSUE_URLS} não existe — pulando."
            exit 0
          fi
          TOTAL=$(jq '.summary.total_dead' audit_dead_urls_report.json)
          RESOLVED=$(jq '.summary.resolved_via_wayback' audit_dead_urls_report.json)
          PCT=$(jq '.summary.coverage_pct' audit_dead_urls_report.json)
          if [ "$TOTAL" = "0" ]; then
            echo "ℹ️ Zero dead URLs — não comentando."
            exit 0
          fi
          SAMPLES=$(jq -r '.dead_urls[:10] | .[] | "- ~~\(.original_url)~~ → " + (.archived_url // "_(sem snapshot Wayback)_")' audit_dead_urls_report.json)
          gh issue comment "${ISSUE_URLS}" --body "$(cat <<EOF
          ## 🤖 Auto-Resolver Report — $(date -u +%Y-%m-%d)

          - URLs mortos: **${TOTAL}**
          - Resolvidos via Wayback: **${RESOLVED}** (${PCT}%)
          - Relatório completo: artifact \`audit-curation-reports-${{ github.run_number }}\`

          ### Sugestões Wayback (top 10)

          ${SAMPLES}

          _Atualizado automaticamente por \`.github/workflows/auto-curation.yml\`._
          EOF
          )"

      - name: Comment on issue #164 (coverage)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f audit_coverage_report.json ]; then
            echo "ℹ️ audit_coverage_report.json ausente — pulando."
            exit 0
          fi
          if ! gh issue view "${ISSUE_COVERAGE}" >/dev/null 2>&1; then
            echo "ℹ️ Issue #${ISSUE_COVERAGE} não existe — pulando."
            exit 0
          fi
          CANDIDATOS=$(jq '.summary.candidatos_preenchimento' audit_coverage_report.json)
          SUBUTIL=$(jq '.summary.subutilizados' audit_coverage_report.json)
          if [ "$CANDIDATOS" = "0" ] && [ "$SUBUTIL" = "0" ]; then
            echo "ℹ️ Coverage 100% — não comentando."
            exit 0
          fi
          SAMPLES=$(jq -r '.candidatos_preenchimento[:10] | .[] | "- [`\(.categoria_id)`] campo `\(.campo)` (grupo \(.aplicabilidade): \(.grupo_cobertura_pct)% de cobertura)"' audit_coverage_report.json)
          gh issue comment "${ISSUE_COVERAGE}" --body "$(cat <<EOF
          ## 🤖 Coverage Audit Report — $(date -u +%Y-%m-%d)

          - Campos sub-utilizados (<10% cov): **${SUBUTIL}**
          - Candidatos a preenchimento: **${CANDIDATOS}**
          - Relatório completo: artifact \`audit-curation-reports-${{ github.run_number }}\`

          ### Candidatos (top 10)

          ${SAMPLES}

          _Atualizado automaticamente por \`.github/workflows/auto-curation.yml\`._
          EOF
          )"

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-curation-reports-${{ github.run_number }}
          path: |
            audit_dicas_report.json
            audit_dead_urls_report.json
            audit_coverage_report.json
            validation_report.json
          retention-days: 90
