name: Content Freshness Monitor

# Agent: Monitora atualização de conteúdo
# - Detecta direitos não revistos há > 90 dias
# - Identifica novos candidatos via discover_benefits

on:
  schedule:
    # 1º e 15º de cada mês às 11:00 UTC (08:00 BRT)
    - cron: "0 11 1,15 * *"
  workflow_dispatch:
    inputs:
      threshold_days:
        description: "Dias para considerar conteúdo desatualizado"
        default: "90"
        type: string

# Top-level default: read-only (least privilege).
# Writes (issues) ficam apenas no job 'monitor'.
permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    name: Content Freshness Check
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --require-hashes --no-deps -r requirements.lock

      - name: Run Content Freshness Monitor
        id: monitor
        run: |
          python scripts/agent_content_freshness_monitor.py \
            --threshold ${{ inputs.threshold_days || '90' }} \
            --create-issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: content-freshness-reports
          path: |
            data/discovery_report.json
            data/discovery_report.md
          retention-days: 30
