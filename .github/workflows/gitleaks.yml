name: gitleaks

# Scan de secrets vazados em código + histórico git.
# Roda em todo push/PR para main e semanalmente.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # toda segunda 06:00 UTC
  workflow_dispatch:

# Top-level default: read-only (least privilege).
# Writes (security-events, pull-requests) ficam apenas no job que precisa.
permissions:
  contents: read

jobs:
  scan:
    name: gitleaks scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF
      pull-requests: write # comentar achados em PR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          fetch-depth: 0 # histórico completo

      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE só é necessária para orgs > 25 users; este é um repo pessoal
