name: Template Branding Guard

on:
  pull_request:
    branches: [main]
    paths:
      - "config.json"
      - ".github/workflows/template-branding-guard.yml"
      - "scripts/check_branding_customized.mjs"
  push:
    branches: [main]
    paths:
      - "config.json"
      - ".github/workflows/template-branding-guard.yml"
      - "scripts/check_branding_customized.mjs"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branding-guard:
    name: Branding must be customized
    runs-on: ubuntu-latest

    # Canonical upstream repo keeps defaults intentionally.
    if: github.repository != 'fabiotreze/nossodireito'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Verify branding config is customized
        run: npm run check:branding
