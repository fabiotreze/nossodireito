name: Template Branding Guard

on:
  pull_request:
    branches: [main]
    paths:
      - "config.json"
      - ".github/workflows/template-branding-guard.yml"
      - "scripts/check_branding_customized.mjs"
  push:
    branches: [main]
    paths:
      - "config.json"
      - ".github/workflows/template-branding-guard.yml"
      - "scripts/check_branding_customized.mjs"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branding-guard:
    name: Branding must be customized
    runs-on: ubuntu-latest

    # Canonical upstream repo keeps defaults intentionally.
    if: github.repository != 'fabiotreze/nossodireito'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Verify branding config is customized
        run: npm run check:branding
