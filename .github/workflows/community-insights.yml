name: Community Insights

# Agent: Analisa padrões em issues/discussions
# - Detecta tópicos recorrentes
# - Sugere FAQs
# - Identifica oportunidades de melhoria

on:
  schedule:
    # Toda sexta-feira às 05:00 UTC (02:00 BRT)
    - cron: "0 5 * * 5"
  workflow_dispatch:
    inputs:
      days:
        description: "Analisar últimos N dias"
        default: "30"
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  insights:
    runs-on: ubuntu-latest
    name: Community Analysis
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Run Community Insights
        id: insights
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/agent_community_insights.py \
            --days ${{ inputs.days || '30' }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: community-insights
          path: community_insights_report.md
          retention-days: 90

      - name: Add to summary
        if: always()
        run: |
          if [ -f community_insights_report.md ]; then
            cat community_insights_report.md >> $GITHUB_STEP_SUMMARY
          fi
