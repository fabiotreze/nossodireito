name: Performance Watchdog

# Agent: Monitora performance e bundle size
# Compara com baseline e alerta sobre regressões

on:
  push:
    branches: [main]
    paths:
      - "js/**"
      - "css/**"
      - "server.js"
      - "index.html"
  schedule:
    # Diário às 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      threshold:
        description: "Threshold % para alertar (default 5%)"
        default: "5"
        type: string

permissions:
  contents: write  # Para commitar baseline
  issues: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    name: Performance Check
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Run Performance Watchdog
        id: perf
        continue-on-error: true
        run: |
          python scripts/agent_performance_watchdog.py \
            --threshold ${{ inputs.threshold || '5' }} \
            --create-issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit baseline update
        if: success() || steps.perf.outcome == 'success'
        run: |
          if [ -f .github/state/performance_baseline.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/state/performance_baseline.json
            git diff --cached --quiet || git commit -m "chore(agent): atualiza baseline de performance"
            git push || echo "⚠️ No push permitido"
          fi
