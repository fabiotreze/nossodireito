# NossoDireito — Quality Gate Pipeline
# Executa verificações de qualidade antes de qualquer deploy.
# Bloqueia push/PR se score < 75 ou se houver achado CRITICAL.
# Cobertura: 42 categorias de direitos PcD validadas.
#
# Triggers:
# - pull_request: status check obrigatório antes do merge
# - workflow_call: chamado por deploy.yml após merge em main (único path para prod)
# - workflow_dispatch: execução manual
#
# Nota: trigger 'push: main' foi removido (#194 W3). Em push para main, deploy.yml
# chama este workflow via workflow_call — evita duplicação.

name: Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_call: {}
  workflow_dispatch: # Permite execução manual

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

# Top-level default: read-only (least privilege).
permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate (36 categorias)
    permissions:
      contents: read
    env:
      # PR e deploy precisam validar o mesmo modo SEO versionado no repositório.
      SEO_PRERENDER_MODE: ${{ vars.SEO_PRERENDER_MODE || 'prerender' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          fetch-depth: 0  # necessário para git describe --tags (semver gate) e diff origin/main (cache gate)

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Instalar dependências Python
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Instalar dependências Node
        run: npm ci --no-audit --no-fund

      # ── Testes Node (geo, anonymizer, week-plan, sanitizePlanKey) ──
      - name: Executar testes Node
        run: |
          echo "🧪 Executando testes Node..."
          npm run test:js

      # ── Doc links 404 guard (preveniu o caso REPLICATION.md em 28/mai) ──
      - name: Validar links relativos em docs
        run: |
          echo "🔗 Validando links relativos em README.md e docs/..."
          node scripts/check_doc_links.mjs

      # ── Doc truth guard (preveniu drift PWA/master_compliance/legacy em 28/mai) ──
      - name: Validar verdade dos docs (sem features removidas)
        run: |
          echo "🧭 Validando que docs não citam features removidas..."
          node scripts/check_docs_truth.mjs

      # ── Version sync guard (preveniu drift package.json vs data/direitos.json em 28/mai) ──
      - name: Validar sincronização de versão
        run: |
          echo "🔢 Validando sincronização de versão entre package.json, docs, index.html e data/..."
          node scripts/check_version_sync.mjs

      # ── Testes Python (pytest) ──
      - name: Executar testes Python
        run: |
          echo "🧪 Executando testes Python..."
          python -m pytest tests/ -v --tb=short --ignore=tests/test_e2e_playwright.py -q

      # ── Sensitive Data Scan (pre-check rápido) ──
      - name: Scan para dados sensíveis
        run: |
          echo "🔍 Escaneando arquivos rastreados por segredos..."
          FOUND=0

          # Padrões de segredos
          PATTERNS=(
            "-----BEGIN.*PRIVATE KEY-----"
            "-----BEGIN CERTIFICATE-----"
            "AKIA[0-9A-Z]{16}"
            "ghp_[a-zA-Z0-9]{36}"
            "sk-[a-zA-Z0-9]{20,}"
          )

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git grep -l -E "$pattern" -- ':!.github/' 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "❌ Padrão suspeito encontrado: $pattern"
              echo "$MATCHES"
              FOUND=$((FOUND + 1))
            fi
          done

          # Verificar extensões sensíveis
          for ext in pfx pem key p12 env; do
            FILES=$(git ls-files "*.${ext}" 2>/dev/null || true)
            if [ -n "$FILES" ]; then
              echo "❌ Arquivo sensível rastreado: $FILES"
              FOUND=$((FOUND + 1))
            fi
          done

          if [ "$FOUND" -gt 0 ]; then
            echo ""
            echo "🚫 FALHOU: $FOUND padrão(ões) de dados sensíveis encontrado(s)!"
            exit 1
          fi

          echo "✅ Nenhum dado sensível detectado nos arquivos rastreados."

      # ── Quality Gate Principal (único entry point) ──
      # Inclui validate_content + 16 fases. Não duplicar validação antes.
      - name: Executar Quality Gate (validate_all.py)
        run: |
          echo "🔎 Executando Quality Gate..."
          python scripts/validate_all.py --quick

      # ── SEO mode gate (home-only|prerender) ──
      - name: Validar consistência SEO do modo ativo
        run: |
          echo "🔎 Validando modo SEO: ${SEO_PRERENDER_MODE}"
          if [ "${SEO_PRERENDER_MODE}" = "prerender" ]; then
            python3 scripts/prerender_direitos.py
          fi
          python3 scripts/prerender_direitos.py --check --mode "${SEO_PRERENDER_MODE}"

      # ── Salvar relatório como artefato ──
      - name: Copiar relatório JSON
        if: always()
        run: |
          cp validation_report.json quality-gate-report.json 2>&1 || true

      - name: Upload relatório
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: quality-gate-report
          path: quality-gate-report.json
          retention-days: 30

      # ── Resumo no GitHub Actions ──
      - name: Resumo do Quality Gate
        if: always()
        run: |
          echo "## 🔎 Quality Gate Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SCORE=$(python -c "
          import json, sys
          try:
              with open('quality-gate-report.json') as f:
                  data = json.load(f)
              print(f\"Score: **{data['score_total']}/100**\")
              print()
              print('| Categoria | Score |')
              print('|-----------|-------|')
              for cat, score in sorted(data['categorias_scores'].items(), key=lambda x: -x[1]):
                  emoji = '✅' if score >= 80 else '⚠️' if score >= 50 else '❌'
                  print(f'| {emoji} {cat} | {score} |')
              print()
              criticals = sum(1 for a in data['achados'] if 'CRITICAL' in a.get('severidade', ''))
              errors = sum(1 for a in data['achados'] if 'ERROR' in a.get('severidade', ''))
              warnings = sum(1 for a in data['achados'] if 'WARNING' in a.get('severidade', ''))
              print(f'**CRITICAL:** {criticals} | **ERROR:** {errors} | **WARNING:** {warnings}')
          except Exception as e:
              print(f'Erro ao ler relatório: {e}')
          " 2>&1)

          echo "$SCORE" >> $GITHUB_STEP_SUMMARY
