# NossoDireito â€” RevisĂŁo PeriĂłdica de Fontes
# Abre uma issue periodicamente lembrando de revisar as fontes oficiais.
# Para automaĂ§ĂŁo completa de verificaĂ§ĂŁo de links, descomente a seĂ§ĂŁo "link-check".

name: RevisĂŁo PeriĂłdica de Fontes

on:
  schedule:
    # Toda segunda-feira Ă s 09:00 UTC (06:00 BRT)
    - cron: "0 9 * * 1"
  workflow_dispatch: # Permite execuĂ§ĂŁo manual

# Top-level default: read-only (least privilege).
# Writes (issues) sĂŁo concedidos apenas no job que precisa.
permissions:
  contents: read

jobs:
  create-review-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      # Nome base do projeto â€” fonte Ăşnica de verdade para nomes Azure
      PROJECT: "nossodireito-br"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependĂŞncias
        run: pip install -r requirements.txt

      - name: Quality Gate (validar cĂłdigo atual)
        id: qg
        continue-on-error: true
        run: |
          python scripts/validate_all.py --quick > qg_result.txt 2>&1 || true
          SCORE=$(cat validation_report.json | python -c "import json,sys; d=json.load(sys.stdin); print(f\"{d['summary']['passed']}/{d['summary']['total']}\")" 2>/dev/null || echo "N/A")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          if [ -f validation_report.json ]; then
            echo "status=âś… PASSOU ($SCORE)" >> "$GITHUB_OUTPUT"
          else
            echo "status=âťŚ FALHOU ($SCORE)" >> "$GITHUB_OUTPUT"
          fi

      - name: Health check do site
        id: health
        continue-on-error: true
        run: |
          # Cloudflare-only inbound: checks devem priorizar o domĂ­nio pĂşblico.
          HZ=$(curl -A "Mozilla/5.0 (compatible; weekly-review-bot/1.0)" -s -o /dev/null -w "%{http_code}" --max-time 10 "https://nossodireito.fabiotreze.com/health" 2>/dev/null || echo "ERRO")
          CD=$(curl -A "Mozilla/5.0 (compatible; weekly-review-bot/1.0)" -s -o /dev/null -w "%{http_code}" --max-time 10 "https://nossodireito.fabiotreze.com/" 2>/dev/null || echo "ERRO")
          AZ=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://app-${PROJECT}.azurewebsites.net/" 2>/dev/null || echo "ERRO")

          echo "health=$HZ" >> "$GITHUB_OUTPUT"
          echo "custom_domain=$CD" >> "$GITHUB_OUTPUT"
          echo "azure_direct=$AZ" >> "$GITHUB_OUTPUT"

          STATUS="âś…"
          # Esperado: domĂ­nio pĂşblico 200 e hostname direto do Azure bloqueado (403).
          if [ "$HZ" != "200" ] || [ "$CD" != "200" ] || [ "$AZ" != "403" ]; then
            STATUS="âš ď¸Ź"
          fi
          echo "overall=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Extrair fontes do JSON
        id: fontes
        run: |
          VERSAO=$(jq -r '.versao' data/direitos.json)
          ULTIMA=$(jq -r '.ultima_atualizacao' data/direitos.json)
          NUM_FONTES=$(jq '.fontes | length' data/direitos.json)
          NUM_CATEGORIAS=$(jq '.categorias | length' data/direitos.json)
          echo "versao=$VERSAO" >> "$GITHUB_OUTPUT"
          echo "ultima=$ULTIMA" >> "$GITHUB_OUTPUT"
          echo "num_fontes=$NUM_FONTES" >> "$GITHUB_OUTPUT"
          echo "num_categorias=$NUM_CATEGORIAS" >> "$GITHUB_OUTPUT"

      - name: ValidaĂ§ĂŁo completa de fontes (URLs)
        id: validate_urls
        continue-on-error: true
        run: |
          echo "đź”— Validando todas as URLs das fontes oficiais..."
          python scripts/validate_sources.py --urls --json > url-validation.json || true

          # Extract summary
          TOTAL=$(jq '.total' url-validation.json)
          OK=$(jq '.ok' url-validation.json)
          WARNINGS=$(jq '.warnings' url-validation.json)
          ERRORS=$(jq '.errors' url-validation.json)
          SCORE=$(echo "scale=1; $OK * 100 / $TOTAL" | bc)

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "ok=$OK" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          # Generate markdown report
          echo "## đź”— ValidaĂ§ĂŁo de URLs" > url-report.md
          echo "" >> url-report.md
          echo "**Total:** $TOTAL URLs | **âś… OK:** $OK | **âš ď¸Ź Warnings:** $WARNINGS | **âťŚ Erros:** $ERRORS" >> url-report.md
          echo "" >> url-report.md
          echo "**Score de ValidaĂ§ĂŁo:** $SCORE%" >> url-report.md
          echo "" >> url-report.md

          if [ "$ERRORS" -gt 0 ]; then
            echo "### âťŚ URLs com Erro:" >> url-report.md
            echo "" >> url-report.md
            jq -r '.results[] | select(.status == "error") | "- **\(.item)**: \(.message) ([link](\(.url)))"' url-validation.json >> url-report.md
            echo "" >> url-report.md
          fi

          if [ "$WARNINGS" -gt 0 ]; then
            echo "### âš ď¸Ź URLs com Avisos:" >> url-report.md
            echo "" >> url-report.md
            jq -r '.results[] | select(.status == "warning") | "- **\(.item)**: \(.message) ([link](\(.url)))"' url-validation.json >> url-report.md
            echo "" >> url-report.md
          fi

          echo "âś… ValidaĂ§ĂŁo completa gerada em url-report.md"

      - name: Descoberta automĂˇtica de novos benefĂ­cios PcD
        id: discovery
        continue-on-error: true
        run: |
          echo "đź”Ť Executando descoberta automĂˇtica de novos benefĂ­cios..."
          python scripts/discover_benefits.py --since 14 --json > discovery_output.json 2>discovery_log.txt || true

          DISC_TOTAL=$(jq '.candidates_found // 0' discovery_output.json 2>/dev/null || echo "0")
          DISC_ALTA=$(jq '.candidates_by_priority.ALTA // 0' discovery_output.json 2>/dev/null || echo "0")

          echo "disc_total=$DISC_TOTAL" >> "$GITHUB_OUTPUT"
          echo "disc_alta=$DISC_ALTA" >> "$GITHUB_OUTPUT"

          # Gera relatĂłrio MD
          echo "## đź†• Descoberta AutomĂˇtica de BenefĂ­cios" > disc-report.md
          echo "" >> disc-report.md
          if [ "$DISC_TOTAL" -gt 0 ]; then
            echo "**$DISC_TOTAL candidatos encontrados** ($DISC_ALTA prioridade ALTA)" >> disc-report.md
            echo "" >> disc-report.md
            jq -r '.candidates[] | "- \(if .priority == "ALTA" then "đź”´" elif .priority == "MĂ‰DIA" then "đźźˇ" else "đźź˘" end) **\(.title[:80])** (\(.source)) â†’ `\(.suggested_category)`"' discovery_output.json >> disc-report.md 2>/dev/null
          else
            echo "âś… Nenhum benefĂ­cio novo detectado esta semana." >> disc-report.md
          fi
          echo "" >> disc-report.md

      - name: Verificar fontes legislativas por mudanĂ§as recentes
        id: legcheck
        continue-on-error: true
        run: |
          echo "## VerificaĂ§ĂŁo de MudanĂ§as Legislativas" > leg-report.md
          echo "" >> leg-report.md
          echo "### Sites oficiais para revisar manualmente:" >> leg-report.md
          echo "" >> leg-report.md
          echo "| Fonte | URL | O que verificar |" >> leg-report.md
          echo "|-------|-----|-----------------|" >> leg-report.md
          echo "| Planalto | https://www.planalto.gov.br/ccivil_03/ | Novas leis PcD |" >> leg-report.md
          echo "| DOU | https://www.in.gov.br/servicos/diario-oficial-da-uniao | Decretos e portarias |" >> leg-report.md
          echo "| gov.br INSS | https://www.gov.br/inss/pt-br/noticias | MudanĂ§as BPC/benefĂ­cios |" >> leg-report.md
          echo "| ANS | https://www.gov.br/ans/pt-br/assuntos/noticias | Rol de procedimentos |" >> leg-report.md
          echo "| Min. Cidades | https://www.gov.br/cidades/pt-br | Minha Casa Minha Vida |" >> leg-report.md
          echo "| ABNT | https://www.abntcatalogo.com.br/ | NBR 9050 atualizaĂ§Ăµes |" >> leg-report.md
          echo "" >> leg-report.md

          # Check key pages for PcD content updates
          CHANGES=0
          echo "### DetecĂ§ĂŁo automĂˇtica de pĂˇginas com conteĂşdo PcD:" >> leg-report.md
          echo "" >> leg-report.md

          # Check LBI page
          LBI_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -L "https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2015/lei/l13146.htm" 2>/dev/null || echo "ERRO")
          LBI_SIZE=$(curl -s --max-time 10 -L "https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2015/lei/l13146.htm" 2>/dev/null | wc -c)
          echo "- LBI (Lei 13.146/2015): HTTP $LBI_STATUS, $LBI_SIZE bytes" >> leg-report.md

          echo "" >> leg-report.md
          echo "changes=$CHANGES" >> "$GITHUB_OUTPUT"

      - name: Validar cĂłdigos CID (OMS ICD API)
        id: cidcheck
        continue-on-error: true
        env:
          ICD_CLIENT_ID: ${{ secrets.ICD_CLIENT_ID }}
          ICD_CLIENT_SECRET: ${{ secrets.ICD_CLIENT_SECRET }}
        run: |
          pip install requests > /dev/null 2>&1
          if [ -z "$ICD_CLIENT_ID" ] || [ -z "$ICD_CLIENT_SECRET" ]; then
            echo "âš ď¸Ź ICD_CLIENT_ID / ICD_CLIENT_SECRET nĂŁo configurados â€” pulando validaĂ§ĂŁo CID." > cid-report.md
            echo "cid_ok=0" >> "$GITHUB_OUTPUT"
            echo "cid_total=0" >> "$GITHUB_OUTPUT"
            echo "cid_errors=0" >> "$GITHUB_OUTPUT"
          else
            RESULT=$(python scripts/validate_sources.py --cid --json 2>&1) || true
            echo "$RESULT" > cid-raw.json

            CID_OK=$(echo "$RESULT" | grep -oP '"ok":\s*\K[0-9]+' || echo "0")
            CID_TOTAL=$(echo "$RESULT" | grep -oP '"total":\s*\K[0-9]+' || echo "0")
            CID_ERRORS=$((CID_TOTAL - CID_OK))

            echo "cid_ok=$CID_OK" >> "$GITHUB_OUTPUT"
            echo "cid_total=$CID_TOTAL" >> "$GITHUB_OUTPUT"
            echo "cid_errors=$CID_ERRORS" >> "$GITHUB_OUTPUT"

            echo "## ValidaĂ§ĂŁo CID (OMS ICD API)" > cid-report.md
            echo "" >> cid-report.md
            if [ "$CID_ERRORS" = "0" ]; then
              echo "âś… **$CID_OK/$CID_TOTAL** cĂłdigos CID validados com sucesso." >> cid-report.md
            else
              echo "âťŚ **$CID_ERRORS/$CID_TOTAL** cĂłdigos CID com erro." >> cid-report.md
            fi
          fi

      - name: Criar issue de revisĂŁo
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9.0.0
        env:
          VERSAO: ${{ steps.fontes.outputs.versao }}
          ULTIMA: ${{ steps.fontes.outputs.ultima }}
          NUM_FONTES: ${{ steps.fontes.outputs.num_fontes }}
          NUM_CATEGORIAS: ${{ steps.fontes.outputs.num_categorias }}
          QG_STATUS: ${{ steps.qg.outputs.status }}
          HEALTH_OVERALL: ${{ steps.health.outputs.overall }}
          HEALTH_HZ: ${{ steps.health.outputs.health }}
          HEALTH_CD: ${{ steps.health.outputs.custom_domain }}
          HEALTH_AZ: ${{ steps.health.outputs.azure_direct }}
          CID_OK: ${{ steps.cidcheck.outputs.cid_ok }}
          CID_TOTAL: ${{ steps.cidcheck.outputs.cid_total }}
          CID_ERRORS: ${{ steps.cidcheck.outputs.cid_errors }}
          URL_SCORE: ${{ steps.validate_urls.outputs.score }}
          URL_ERRORS: ${{ steps.validate_urls.outputs.errors }}
          URL_WARNINGS: ${{ steps.validate_urls.outputs.warnings }}
          DISC_TOTAL: ${{ steps.discovery.outputs.disc_total }}
          DISC_ALTA: ${{ steps.discovery.outputs.disc_alta }}
        with:
          script: |
            const fs = require('fs');
            const legReport = fs.existsSync('leg-report.md') ? fs.readFileSync('leg-report.md', 'utf8') : 'âš ď¸Ź RelatĂłrio legislativo nĂŁo disponĂ­vel.';
            const cidReport = fs.existsSync('cid-report.md') ? fs.readFileSync('cid-report.md', 'utf8') : 'âš ď¸Ź RelatĂłrio CID nĂŁo disponĂ­vel.';
            const urlReport = fs.existsSync('url-report.md') ? fs.readFileSync('url-report.md', 'utf8') : 'âš ď¸Ź ValidaĂ§ĂŁo de URLs nĂŁo executada.';
            const discReport = fs.existsSync('disc-report.md') ? fs.readFileSync('disc-report.md', 'utf8') : 'âš ď¸Ź Descoberta automĂˇtica nĂŁo executada.';
            const today = new Date().toISOString().split('T')[0];

            const e = (v, fallback = 'N/A') => process.env[v] || fallback;

            const body = [
              `# đź“‹ RevisĂŁo PeriĂłdica â€” ${today}`,
              '',
              `**VersĂŁo atual:** v${e('VERSAO')}`,
              `**Ăšltima atualizaĂ§ĂŁo:** ${e('ULTIMA')}`,
              `**Fontes cadastradas:** ${e('NUM_FONTES')}`,
              `**Categorias:** ${e('NUM_CATEGORIAS')}`,
              '',
              '## đźŹĄ Status do Site',
              '',
              '| VerificaĂ§ĂŁo | Resultado |',
              '|-------------|-----------|',
              `| Quality Gate | ${e('QG_STATUS')} |`,
              `| Health Probe (/health) | HTTP ${e('HEALTH_HZ')} |`,
              `| Custom Domain | HTTP ${e('HEALTH_CD')} |`,
              `| Azure hostname direto (esperado 403) | HTTP ${e('HEALTH_AZ')} |`,
              `| URL Validation | ${e('URL_SCORE', '?')}% (${e('URL_ERRORS', '?')} erros, ${e('URL_WARNINGS', '?')} avisos) |`,
              `| CID (OMS ICD API) | ${e('CID_OK', '?')}/${e('CID_TOTAL', '?')} âś… |`,
              `| **Status Geral** | **${e('HEALTH_OVERALL')}** |`,
              '',
              '## Checklist de RevisĂŁo',
              '',
              '### đź“ś LegislaĂ§ĂŁo',
              '- [ ] Verificar se houve alteraĂ§Ăµes legislativas (planalto.gov.br)',
              '- [ ] Conferir valores atualizados (salĂˇrio mĂ­nimo, BPC)',
              '- [ ] Checar novas leis ou decretos relevantes para PcD',
              '- [ ] Verificar DiĂˇrio Oficial da UniĂŁo (in.gov.br) para portarias e decretos',
              '- [ ] Checar se houve mudanĂ§as no Minha Casa Minha Vida (gov.br/cidades)',
              '',
              '### đźŹ›ď¸Ź ServiĂ§os',
              '- [ ] Testar links de serviĂ§os (gov.br, INSS, ANS)',
              '- [ ] Verificar se os procedimentos/passos continuam os mesmos',
              '- [ ] Checar se hĂˇ novos serviĂ§os digitais disponĂ­veis',
              '',
              '### đź“‹ ConteĂşdo',
              '- [ ] Revisar dicas e orientaĂ§Ăµes por categoria',
              '- [ ] Verificar se documentos necessĂˇrios mudaram',
              '- [ ] Atualizar data de "ultima_atualizacao" no JSON',
              '',
              '### đźŹ  Categorias',
              '- [ ] Verificar se algum direito PcD novo surgiu (ver backlog no GOVERNANCE.md)',
              '- [ ] Checar se alguma categoria existente precisa de atualizaĂ§ĂŁo de valores',
              '- [ ] Verificar cobertura de instituiĂ§Ăµes para todas as categorias',
              '- [ ] Rodar `python scripts/validate_content.py` para validar schema',
              '',
              '### đź”— VerificaĂ§ĂŁo de Links',
              urlReport,
              '',
              '### đź“ś VerificaĂ§ĂŁo Legislativa',
              legReport,
              '',
              '### đźŹĄ ValidaĂ§ĂŁo CID',
              cidReport,
              '',
              '### đź†• Descoberta AutomĂˇtica de BenefĂ­cios',
              discReport,
              '',
              '---',
              '*Issue criada automaticamente pelo workflow de revisĂŁo periĂłdica.*',
              '*Consulte GOVERNANCE.md para critĂ©rios de adiĂ§ĂŁo de fontes e categorias.*',
              '*ApĂłs a revisĂŁo, atualize `ultima_atualizacao` em `data/direitos.json`.*',
            ].join('\n');

            // Ensure labels exist before creating the issue
            const labels = ['revisĂŁo-periĂłdica', 'fontes'];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: label === 'revisĂŁo-periĂłdica' ? '0075ca' : 'd876e3',
                });
              }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `đź“‹ RevisĂŁo periĂłdica de fontes â€” ${today}`,
              body: body,
              labels: labels,
            });
