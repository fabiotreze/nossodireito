name: CodeQL

# CodeQL Advanced — análise estática de segurança para JavaScript + Python.
# Por que custom (não default): cobre 2 linguagens, custom queries de security-extended,
# e schedule semanal para detectar CVEs novos em padrões antigos.
#
# Conformidade:
#  - LGPD: ajuda a detectar vazamento de PII em logs (security-and-quality suite).
#  - SECURITY.md: alimenta o canal de Private Vulnerability Reporting com sinais reais.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Segunda-feira 03:00 UTC — pega CVEs publicados no fim de semana
    - cron: "0 3 * * 1"

# Cancela runs antigos do mesmo branch para economizar minutos
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Top-level default: read-only (least privilege).
# security-events: write fica apenas no job analyze, que publica os SARIFs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # publica alertas na aba Security
      actions: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-and-quality = security-extended + maintainability + reliability.
          # Inclui detectores de PII, SSRF, XSS, prototype pollution, path traversal.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # v4
        with:
          category: "/language:${{ matrix.language }}"
