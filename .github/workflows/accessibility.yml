# Accessibility (WCAG 2.1 AA) audit via axe-core on every PR + push to main.
# Fails on serious/critical violations. Moderate/minor are reported but non-blocking.

name: Accessibility (axe-core)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  axe:
    runs-on: ubuntu-latest
    name: A11y (axe-core WCAG 2.1 AA)
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run axe-core audit (${{ matrix.browser }})
        env:
          BROWSER: ${{ matrix.browser }}
          # All 3 engines pass strictly after v1.33.0 baseline — SOFT_FAIL retained for break-glass only.
          SOFT_FAIL: "0"
        run: node tests/a11y.mjs | tee a11y-report-${{ matrix.browser }}.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: a11y-report-${{ matrix.browser }}
          path: a11y-report-${{ matrix.browser }}.txt
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          echo "## ♿ Accessibility (axe-core) — ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ matrix.browser }}" = "webkit" ]; then
            echo "_WebKit em modo **warning-only** (baseline cross-browser)._" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 a11y-report-${{ matrix.browser }}.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no report)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
