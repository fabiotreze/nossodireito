# Accessibility (WCAG 2.1 AA) audit via axe-core em PR + baseline semanal.
# Fails on serious/critical violations. Moderate/minor are reported but non-blocking.

name: Accessibility (axe-core)

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 10 * * 1" # Segunda 10:00 UTC
  workflow_dispatch:

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  axe:
    runs-on: ubuntu-latest
    name: A11y (axe-core WCAG 2.1 AA)
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # PR: smoke-test em chromium (feedback rápido, axe-core é engine-agnostic).
        # Push em main / schedule / dispatch: matriz completa (cross-browser baseline).
        # #194 W5 — reduz tempo de CI em PR sem perder cobertura em main.
        browser: ${{ github.event_name == 'pull_request' && fromJSON('["chromium"]') || fromJSON('["chromium","firefox","webkit"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run axe-core audit (${{ matrix.browser }})
        env:
          BROWSER: ${{ matrix.browser }}
          # All 3 engines pass strictly after v1.33.0 baseline — SOFT_FAIL retained for break-glass only.
          SOFT_FAIL: "0"
        run: node tests/a11y.mjs | tee a11y-report-${{ matrix.browser }}.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: a11y-report-${{ matrix.browser }}
          path: a11y-report-${{ matrix.browser }}.txt
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          echo "## ♿ Accessibility (axe-core) — ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ matrix.browser }}" = "webkit" ]; then
            echo "_WebKit em modo **warning-only** (baseline cross-browser)._" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 a11y-report-${{ matrix.browser }}.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no report)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
