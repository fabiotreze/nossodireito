# Lighthouse CI — Performance, SEO, Best Practices, A11y, PWA (warning-only baseline).
# Roda em PR e semanalmente (baseline contínuo). Não bloqueia merge nesta fase (warning-only via assertions).
# Após 1-2 ciclos de baseline, evoluir thresholds para "error" e promover a required check.

name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Segunda 09:00 UTC
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # Nome alinhado com lighthouserc.json (onlyCategories sem 'pwa'). #194 W4.
    name: Lighthouse (perf/a11y/bp/seo)
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Lighthouse CI
        # Pinned exact version (CodeQL PinnedDependenciesID alert #192)
        run: npm install -g @lhci/cli@0.14.0

      - name: Run Lighthouse CI
        run: lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          echo "## 🚦 Lighthouse CI (baseline warning-only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Thresholds atuais (warn): perf≥85, a11y≥90, bp≥90, seo≥90, pwa≥50." >> $GITHUB_STEP_SUMMARY
          echo "Esta fase é **non-blocking** — após baseline (1-2 ciclos), promover a required check." >> $GITHUB_STEP_SUMMARY
          if [ -d .lighthouseci ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📊 Reports artifact: \`lighthouse-reports\` (retention 30d)" >> $GITHUB_STEP_SUMMARY
          fi
