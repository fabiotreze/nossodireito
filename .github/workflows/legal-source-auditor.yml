name: Legal Source Auditor

# Agent: Valida fontes legais e URLs periodicamente
# - Detecta links quebrados
# - Valida certificados SSL
# - Alerta sobre fontes desatualizadas (> 90 dias)

on:
  schedule:
    # Toda semana, terça às 08:00 UTC (05:00 BRT)
    - cron: "0 8 * * 2"
  workflow_dispatch:
    inputs:
      create_issue:
        description: "Criar issue se achar problemas"
        default: false
        type: boolean

# Top-level default: read-only (least privilege).
# Writes (issues, security-events) ficam apenas no job 'audit'.
permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Audit Legal Sources
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      security-events: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Legal Source Auditor
        id: audit
        run: |
          python scripts/agent_legal_source_auditor.py \
            $([ "${{ inputs.create_issue || 'false' }}" = "true" ] && echo "--create-issue" || echo "")
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: legal-sources-audit
          path: |
            validation_report.json
          retention-days: 30
