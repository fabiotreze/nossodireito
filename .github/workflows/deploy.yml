# NossoDireito — Deploy para Azure App Service
# Dispara em push na branch main.
# ⚠️ Deploy SÓ executa se Quality Gate passar.

name: Deploy Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "index.min.html"
      - "server.js"
      - "package.json"
      - "css/**"
      - "js/**"
      - "data/**"
      - "images/**"
      - "robots.txt"
      - "sitemap.xml"
      - "sw.js"
      - "manifest.json"
      - "direitos/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: deploy-nossodireito
  cancel-in-progress: false

env:
  # Nome base do projeto — fonte única de verdade para nomes Azure
  PROJECT: "nossodireito-br"

jobs:
  # ── Quality Gate (obrigatório antes do deploy) ──
  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Testes Python (pytest)
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_e2e_playwright.py -q

      - name: Scan dados sensíveis
        run: |
          FOUND=0
          for ext in pfx pem key p12 env; do
            FILES=$(git ls-files "*.${ext}" 2>/dev/null || true)
            if [ -n "$FILES" ]; then
              echo "❌ Arquivo sensível: $FILES"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ "$FOUND" -gt 0 ]; then exit 1; fi
          echo "✅ Sem dados sensíveis."

      - name: Quality Gate (validate_all --quick)
        run: python scripts/validate_all.py --quick

  # ── Deploy (só executa se quality-gate passar) ──
  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    name: Deploy to App Service
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      - name: Atualizar sitemap.xml lastmod (SEO)
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|" sitemap.xml
          echo "✅ sitemap.xml lastmod → ${TODAY}"

      - name: Minificar HTML, JS e CSS
        run: |
          npm install --no-save terser clean-css-cli html-minifier-terser

          npx terser js/app.js --compress --mangle --output js/app.min.js
          ORIG=$(wc -c < js/app.js)
          MINI=$(wc -c < js/app.min.js)
          echo "✅ JS: ${ORIG}B → ${MINI}B ($(( (ORIG - MINI) * 100 / ORIG ))% redução)"
          mv js/app.min.js js/app.js

          npx cleancss -o css/styles.min.css css/styles.css
          ORIG_CSS=$(wc -c < css/styles.css)
          MINI_CSS=$(wc -c < css/styles.min.css)
          echo "✅ CSS: ${ORIG_CSS}B → ${MINI_CSS}B ($(( (ORIG_CSS - MINI_CSS) * 100 / ORIG_CSS ))% redução)"
          mv css/styles.min.css css/styles.css

          npx html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o index.min.html index.html
          ORIG_HTML=$(wc -c < index.html)
          MINI_HTML=$(wc -c < index.min.html)
          echo "✅ HTML: ${ORIG_HTML}B → ${MINI_HTML}B ($(( (ORIG_HTML - MINI_HTML) * 100 / ORIG_HTML ))% redução)"
          mv index.min.html index.html

      - name: Instalar dependências (production)
        run: |
          npm ci --production --ignore-scripts 2>/dev/null || npm install --production
          echo "✅ node_modules: $(du -sh node_modules | cut -f1)"

      - name: Criar pacote de deploy
        run: |
          zip -r site.zip \
            index.html server.js package.json package-lock.json \
            robots.txt sitemap.xml sw.js manifest.json \
            node_modules/ css/ js/ data/ direitos/ images/ shared/ services/ \
            -x "*.bak" "*.swa.bak" "__pycache__/*" \
            "terraform/*" ".github/*" "tests/*" "docs/*" \
            "node_modules/.package-lock.json" "node_modules/.cache/*"

          SIZE=$(wc -c < site.zip)
          echo "📦 site.zip: ${SIZE} bytes (inclui node_modules)"

      - name: Verificar infraestrutura
        id: infra_check
        run: |
          EXISTS=$(az group exists --name "rg-${PROJECT}")
          echo "rg_exists=${EXISTS}" >> $GITHUB_OUTPUT
          if [ "$EXISTS" != "true" ]; then
            echo "::warning::Resource group 'rg-${PROJECT}' não encontrado. Execute Terraform apply primeiro."
            echo "ℹ️ Vá em Actions > Terraform > Run workflow > action=apply"
          else
            echo "✅ Resource group existe."
          fi

      - name: Deploy to App Service
        id: deploy
        if: steps.infra_check.outputs.rg_exists == 'true'
        run: |
          # Deploy com --async — evita 504 GatewayTimeout em B1
          # || true evita falha se o polling expirar (deploy continua no Azure)
          echo "📦 Iniciando deploy..."
          az webapp deploy \
            --resource-group "rg-${PROJECT}" \
            --name "app-${PROJECT}" \
            --src-path site.zip \
            --type zip \
            --async true \
            --timeout 900 || {
              echo "::warning::Polling expirou — verificando via health check"
            }
          echo "✅ Deploy enviado."

      - name: Health check (Azure state + probe informativo)
        if: always() && steps.infra_check.outputs.rg_exists == 'true'
        env:
          # Probe externo é INFORMATIVO. Cloudflare WAF bloqueia tráfego de
          # IPs do GitHub Actions (zero-trust funcionando como projetado),
          # então o probe via CDN pode falhar sem indicar problema real.
          # Validação BLOQUEANTE é o estado do App Service via Management API.
          HEALTH_URL: "https://nossodireito.fabiotreze.com/health"
          ROOT_URL: "https://nossodireito.fabiotreze.com/"
          UA: "Mozilla/5.0 (compatible; GitHubActions-HealthCheck/1.0)"
        run: |
          echo "⏳ Aguardando estabilização do App Service..."

          # ── 1. BLOQUEANTE: App Service state == Running ──
          MAX_RETRIES=12
          RETRY_DELAY=15
          STATE_OK=false
          for i in $(seq 1 $MAX_RETRIES); do
            STATE=$(az webapp show \
              --resource-group "rg-${PROJECT}" \
              --name "app-${PROJECT}" \
              --query state -o tsv 2>/dev/null || echo "Unknown")
            echo "🔎 Tentativa ${i}/${MAX_RETRIES}: App Service state = ${STATE}"
            if [ "$STATE" = "Running" ]; then
              STATE_OK=true
              break
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              sleep $RETRY_DELAY
            fi
          done

          if [ "$STATE_OK" != "true" ]; then
            echo "::error::App Service não atingiu state=Running após ${MAX_RETRIES} tentativas"
            exit 1
          fi
          echo "✅ App Service está Running."

          # ── 2. INFORMATIVO: probes externos (não bloqueiam) ──
          # Origem-de-verdade já validada acima. Estes probes podem retornar
          # 403 por Cloudflare bot management (IPs GH Actions filtrados) —
          # isso É a postura zero-trust funcionando, não regressão.
          HZ_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 15 \
            -A "$UA" \
            -H "Cache-Control: no-cache" -H "Pragma: no-cache" \
            "$HEALTH_URL" || true)
          echo "🏥 /health via CDN → HTTP ${HZ_STATUS} (informativo)"
          if [ "$HZ_STATUS" != "200" ]; then
            echo "::warning::Probe /health retornou ${HZ_STATUS} via CDN — provavelmente CF bot filter (esperado para IPs GH Actions). Validação real via Azure state passou."
          fi

          CD_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 \
            -A "$UA" \
            "$ROOT_URL" || true)
          echo "🌐 Root via CDN → HTTP ${CD_STATUS} (informativo)"
          if [ "$CD_STATUS" != "200" ]; then
            echo "::warning::Probe root retornou ${CD_STATUS} via CDN — ver nota acima."
          fi

          # ── 3. BLOQUEANTE: Azure domain DEVE retornar 403 (Access Restriction) ──
          # Se retornar 200, é regressão de access policy (vazamento da origem).
          AZ_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-redirs 0 --connect-timeout 10 \
            -A "$UA" \
            -H "Accept: text/html" \
            "https://app-${PROJECT}.azurewebsites.net/" || true)
          echo "🔒 Azure domain (esperado 403 por Access Restriction) → HTTP ${AZ_STATUS}"
          if [ "$AZ_STATUS" != "403" ]; then
            echo "::error::Azure domain devolveu ${AZ_STATUS} (esperado 403). Access Restriction comprometida — investigar imediatamente."
            exit 1
          fi
          echo "✅ Access Restriction ativa (Azure domain bloqueado)."

          echo "✅ Health check concluído (state=Running + Access Restriction ativa)."

      - name: Skip notice
        if: steps.infra_check.outputs.rg_exists != 'true'
        run: |
          echo "::warning::Deploy ignorado — infraestrutura não provisionada."
          echo "Execute: Actions → Terraform → Run workflow → action=apply"

  # ── Validação de Fontes (pós-deploy, não-bloqueante) ──
  validate-sources:
    needs: deploy
    runs-on: ubuntu-latest
    name: Validate Sources (Post-Deploy)
    continue-on-error: true # Não bloqueia pipeline se links estiverem lentos
    if: needs.deploy.result == 'success' || needs.deploy.result == 'skipped'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Validação rápida (amostra de 5 URLs)
        id: quick_check
        continue-on-error: true
        run: |
          echo "🔗 Validando amostra de URLs (quick mode)..."
          python scripts/validate_sources.py --quick --urls || true
          echo "✅ Validação rápida concluída (warnings não bloqueiam)"

      - name: Create issue on validation failure
        if: failure() && steps.quick_check.outcome != 'success'
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9.0.0
        with:
          script: |
            const title = '⚠️ Validação de Fontes: Links com Problemas';
            const body = `## Validação de Fontes Falhou

            A validação rápida detectou links com problemas após o deploy.

            **Ação Recomendada:**
            1. Execute localmente: \`python scripts/validate_sources.py --urls\`
            2. Verifique se URLs governamentais estão temporariamente lentas
            3. Atualize URLs quebrados em \`data/direitos.json\`

            **Links para revisar manualmente:**
            - [Planalto.gov.br](https://www.planalto.gov.br/ccivil_03/)
            - [gov.br Serviços](https://www.gov.br/pt-br/servicos)
            - [INSS](https://meu.inss.gov.br/)

            _Esta issue foi criada automaticamente pelo workflow de deploy._`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['validação', 'fontes']
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['validação', 'fontes', 'automated']
              });
            }
