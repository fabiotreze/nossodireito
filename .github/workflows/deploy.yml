# NossoDireito — Deploy para Azure App Service
# Dispara em push na branch main.
# ⚠️ Deploy SÓ executa se Quality Gate passar.

name: Deploy Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "index.min.html"
      - "historico-aceite.html"
      - "privacidade.html"
      - "server.js"
      - "package.json"
      - "css/**"
      - "js/**"
      - "data/**"
      - "images/**"
      - "robots.txt"
      - "sitemap.xml"
      - "status.html"
      - "termos-de-uso.html"
      - "direitos/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: deploy-nossodireito
  cancel-in-progress: false

env:
  # Nome base do projeto — fonte única de verdade para nomes Azure
  PROJECT: "nossodireito-br"

jobs:
  # ── Quality Gate (obrigatório antes do deploy) ──
  # Reutiliza quality-gate.yml via workflow_call. Era 38 linhas duplicadas
  # (pytest, validate_all, scan-pfx) — removido para single source of truth (#194 W3).
  quality-gate:
    uses: ./.github/workflows/quality-gate.yml

  # ── Deploy (só executa se quality-gate passar) ──
  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    name: Deploy to App Service
    env:
      SEO_PRERENDER_MODE: ${{ vars.SEO_PRERENDER_MODE || 'home-only' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Azure Login (OIDC)
        # Workload Identity Federation: o GitHub Actions emite um token OIDC
        # que o Entra ID valida contra o federated credential
        # `github-nossodireito-main` (subject = repo:fabiotreze/nossodireito:ref:refs/heads/main)
        # no app registration sp-nossodireito-deploy. Sem client-secret.
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Preparar sitemap.xml conforme modo SEO
        run: |
          echo "🔎 SEO_PRERENDER_MODE=${SEO_PRERENDER_MODE}"
          case "${SEO_PRERENDER_MODE}" in
            home-only)
              TODAY=$(date -u +%Y-%m-%d)
              sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|" sitemap.xml
              echo "✅ sitemap.xml lastmod (home-only) → ${TODAY}"
              ;;
            prerender)
              echo "ℹ️ Modo prerender: sitemap será regenerado no stage por scripts/prerender_direitos.py"
              ;;
            *)
              echo "::error::SEO_PRERENDER_MODE inválido: ${SEO_PRERENDER_MODE}. Use home-only ou prerender."
              exit 1
              ;;
          esac

      - name: Minificar HTML, JS e CSS
        run: |
          npm ci --ignore-scripts --no-audit --no-fund

          npx terser js/app.js --compress --mangle --output js/app.min.js
          ORIG=$(wc -c < js/app.js)
          MINI=$(wc -c < js/app.min.js)
          echo "✅ JS: ${ORIG}B → ${MINI}B ($(( (ORIG - MINI) * 100 / ORIG ))% redução)"
          mv js/app.min.js js/app.js

          npx cleancss -o css/styles.min.css css/styles.css
          ORIG_CSS=$(wc -c < css/styles.css)
          MINI_CSS=$(wc -c < css/styles.min.css)
          echo "✅ CSS: ${ORIG_CSS}B → ${MINI_CSS}B ($(( (ORIG_CSS - MINI_CSS) * 100 / ORIG_CSS ))% redução)"
          mv css/styles.min.css css/styles.css

          npx html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o index.min.html index.html
          ORIG_HTML=$(wc -c < index.html)
          MINI_HTML=$(wc -c < index.min.html)
          echo "✅ HTML: ${ORIG_HTML}B → ${MINI_HTML}B ($(( (ORIG_HTML - MINI_HTML) * 100 / ORIG_HTML ))% redução)"
          mv index.min.html index.html

      - name: Instalar dependências (production)
        run: |
          npm ci --omit=dev --ignore-scripts --no-audit --no-fund
          echo "✅ node_modules: $(du -sh node_modules | cut -f1)"

      - name: Criar pacote de deploy
        run: |
          # ── git archive + node_modules ──────────────────────────────────
          # Usar git archive elimina a fragilidade da whitelist manual de
          # diretórios (causa do SITE DOWN em 28/mai/2026 quando lib/ foi
          # esquecido). Tudo que está no HEAD entra automaticamente; o que
          # não deve ir para produção fica fora via `.gitattributes export-ignore`.
          rm -rf /tmp/site_stage && mkdir -p /tmp/site_stage
          git archive --worktree-attributes --format=tar HEAD | tar -x -C /tmp/site_stage
          cp -r node_modules /tmp/site_stage/

          # SEO mode validation/generation roda no workspace (scripts/ pode estar
          # export-ignore no archive) e copia apenas os artefatos finais ao stage.
          case "${SEO_PRERENDER_MODE}" in
            home-only)
              python3 scripts/prerender_direitos.py --check --mode home-only
              cp sitemap.xml /tmp/site_stage/sitemap.xml
              echo "✅ SEO home-only validado e sitemap sincronizado no stage"
              ;;
            prerender)
              python3 scripts/prerender_direitos.py
              python3 scripts/prerender_direitos.py --check --mode prerender
              rm -rf /tmp/site_stage/direitos
              cp -R direitos /tmp/site_stage/direitos
              cp sitemap.xml /tmp/site_stage/sitemap.xml
              echo "✅ SEO prerender gerado, validado e copiado para o stage"
              ;;
            *)
              echo "::error::SEO_PRERENDER_MODE inválido: ${SEO_PRERENDER_MODE}."
              exit 1
              ;;
          esac

          # node_modules artifacts não necessários
          rm -rf /tmp/site_stage/node_modules/.package-lock.json \
                 /tmp/site_stage/node_modules/.cache 2>/dev/null || true

          # Pre-compress static text assets (.br + .gz siblings).
          # Eliminates request-time CPU for large JSON/HTML/CSS/JS files.
          # Root cause fix for 2026-05-30 SEV2: 419KB JSON at Brotli q11
          # took 5–10s of CPU per request, blocking the single worker.
          node scripts/precompress_static.mjs /tmp/site_stage

          ( cd /tmp/site_stage && zip -qr "${GITHUB_WORKSPACE}/site.zip" . \
              -x "*.bak" "*.swa.bak" )

          SIZE=$(wc -c < site.zip)
          echo "📦 site.zip: ${SIZE} bytes (HEAD + node_modules)"
          unzip -l site.zip | tail -3

      - name: Validar status page no stage
        run: |
          test -f /tmp/site_stage/status.html
          grep -F 'href="images/favicon.ico"' /tmp/site_stage/status.html >/dev/null
          grep -F 'fetch("/health"' /tmp/site_stage/status.html >/dev/null
          grep -F '<h1>Status operacional</h1>' /tmp/site_stage/status.html >/dev/null
          echo "✅ status.html validado no stage (arquivo + favicon + fetch /health)."

      - name: Verificar infraestrutura
        id: infra_check
        run: |
          EXISTS=$(az group exists --name "rg-${PROJECT}")
          echo "rg_exists=${EXISTS}" >> $GITHUB_OUTPUT
          if [ "$EXISTS" != "true" ]; then
            echo "::warning::Resource group 'rg-${PROJECT}' não encontrado. Execute Terraform apply primeiro."
            echo "ℹ️ Vá em Actions > Terraform > Run workflow > action=apply"
          else
            echo "✅ Resource group existe."
          fi

      - name: Deploy to App Service
        id: deploy
        if: steps.infra_check.outputs.rg_exists == 'true'
        run: |
          # Deploy com --async — evita 504 GatewayTimeout em B1
          # || true evita falha se o polling expirar (deploy continua no Azure)
          echo "📦 Iniciando deploy..."
          az webapp deploy \
            --resource-group "rg-${PROJECT}" \
            --name "app-${PROJECT}" \
            --src-path site.zip \
            --type zip \
            --async true \
            --timeout 900 || {
              echo "::warning::Polling expirou — verificando via health check"
            }
          echo "✅ Deploy enviado."

      - name: Health check (Azure state + probe informativo)
        if: always() && steps.infra_check.outputs.rg_exists == 'true'
        env:
          # Probe externo é INFORMATIVO. Cloudflare WAF bloqueia tráfego de
          # IPs do GitHub Actions (zero-trust funcionando como projetado),
          # então o probe via CDN pode falhar sem indicar problema real.
          # Validação BLOQUEANTE é o estado do App Service via Management API.
          HEALTH_URL: "https://nossodireito.fabiotreze.com/health"
          ROOT_URL: "https://nossodireito.fabiotreze.com/"
          STATUS_URL: "https://nossodireito.fabiotreze.com/status.html"
          UA: "Mozilla/5.0 (compatible; GitHubActions-HealthCheck/1.0)"
        run: |
          echo "⏳ Aguardando estabilização do App Service..."

          # ── 1. BLOQUEANTE: App Service state == Running ──
          MAX_RETRIES=12
          RETRY_DELAY=15
          STATE_OK=false
          for i in $(seq 1 $MAX_RETRIES); do
            STATE=$(az webapp show \
              --resource-group "rg-${PROJECT}" \
              --name "app-${PROJECT}" \
              --query state -o tsv 2>/dev/null || echo "Unknown")
            echo "🔎 Tentativa ${i}/${MAX_RETRIES}: App Service state = ${STATE}"
            if [ "$STATE" = "Running" ]; then
              STATE_OK=true
              break
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              sleep $RETRY_DELAY
            fi
          done

          if [ "$STATE_OK" != "true" ]; then
            echo "::error::App Service não atingiu state=Running após ${MAX_RETRIES} tentativas"
            exit 1
          fi
          echo "✅ App Service está Running."

          # ── 2. INFORMATIVO: probes externos (não bloqueiam) ──
          # Origem-de-verdade já validada acima. Estes probes podem retornar
          # 403 por Cloudflare bot management (IPs GH Actions filtrados) —
          # isso É a postura zero-trust funcionando, não regressão.
          HZ_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 15 \
            -A "$UA" \
            -H "Cache-Control: no-cache" -H "Pragma: no-cache" \
            "$HEALTH_URL" || true)
          echo "🏥 /health via CDN → HTTP ${HZ_STATUS} (informativo)"
          if [ "$HZ_STATUS" != "200" ]; then
            echo "::warning::Probe /health retornou ${HZ_STATUS} via CDN — provavelmente CF bot filter (esperado para IPs GH Actions). Validação real via Azure state passou."
          fi

          CD_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 \
            -A "$UA" \
            "$ROOT_URL" || true)
          echo "🌐 Root via CDN → HTTP ${CD_STATUS} (informativo)"
          if [ "$CD_STATUS" != "200" ]; then
            echo "::warning::Probe root retornou ${CD_STATUS} via CDN — ver nota acima."
          fi

          STATUS_HTTP=$(curl -s -o /tmp/status_page.html -w "%{http_code}" \
            --connect-timeout 10 --max-time 20 \
            -A "$UA" \
            -H "Cache-Control: no-cache" -H "Pragma: no-cache" \
            "$STATUS_URL" || true)
          echo "📄 /status.html via CDN → HTTP ${STATUS_HTTP}"
          if [ "$STATUS_HTTP" = "200" ]; then
            grep -F 'href="images/favicon.ico"' /tmp/status_page.html >/dev/null || {
              echo "::error::/status.html publicada sem referência esperada ao favicon."
              exit 1
            }
            grep -F '<h1>Status operacional</h1>' /tmp/status_page.html >/dev/null || {
              echo "::error::/status.html publicada sem heading esperado."
              exit 1
            }
            grep -F 'fetch("/health"' /tmp/status_page.html >/dev/null || {
              echo "::error::/status.html publicada sem smoke marker do /health."
              exit 1
            }
            echo "✅ /status.html publicada e smoke-check aprovada."
          elif [ "$STATUS_HTTP" = "403" ] || [ "$STATUS_HTTP" = "503" ]; then
            echo "::warning::Probe /status.html retornou ${STATUS_HTTP} via CDN — provável filtro Cloudflare para IPs de runner. Smoke check remota não pôde ser confirmada, mas a validação do stage já passou."
          else
            echo "::error::/status.html retornou HTTP ${STATUS_HTTP} via CDN."
            exit 1
          fi

          # ── 3. BLOQUEANTE: Azure domain DEVE retornar 403 (Access Restriction) ──
          # Se retornar 200, é regressão de access policy (vazamento da origem).
          AZ_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-redirs 0 --connect-timeout 10 \
            -A "$UA" \
            -H "Accept: text/html" \
            "https://app-${PROJECT}.azurewebsites.net/" || true)
          echo "🔒 Azure domain (esperado 403 por Access Restriction) → HTTP ${AZ_STATUS}"
          if [ "$AZ_STATUS" != "403" ]; then
            echo "::error::Azure domain devolveu ${AZ_STATUS} (esperado 403). Access Restriction comprometida — investigar imediatamente."
            exit 1
          fi
          echo "✅ Access Restriction ativa (Azure domain bloqueado)."

          echo "✅ Health check concluído (state=Running + Access Restriction ativa)."

      - name: Skip notice
        if: steps.infra_check.outputs.rg_exists != 'true'
        run: |
          echo "::warning::Deploy ignorado — infraestrutura não provisionada."
          echo "Execute: Actions → Terraform → Run workflow → action=apply"

  # ── Validação de Fontes (pós-deploy, não-bloqueante) ──
  validate-sources:
    needs: deploy
    runs-on: ubuntu-latest
    name: Validate Sources (Post-Deploy)
    continue-on-error: true # Não bloqueia pipeline se links estiverem lentos
    if: needs.deploy.result == 'success' || needs.deploy.result == 'skipped'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Validação rápida (amostra de 5 URLs)
        id: quick_check
        continue-on-error: true
        run: |
          echo "🔗 Validando amostra de URLs (quick mode)..."
          python scripts/validate_sources.py --quick --urls || true
          echo "✅ Validação rápida concluída (warnings não bloqueiam)"

      - name: Create issue on validation failure
        if: failure() && steps.quick_check.outcome != 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = '⚠️ Validação de Fontes: Links com Problemas';
            const body = `## Validação de Fontes Falhou

            A validação rápida detectou links com problemas após o deploy.

            **Ação Recomendada:**
            1. Execute localmente: \`python scripts/validate_sources.py --urls\`
            2. Verifique se URLs governamentais estão temporariamente lentas
            3. Atualize URLs quebrados em \`data/direitos.json\`

            **Links para revisar manualmente:**
            - [Planalto.gov.br](https://www.planalto.gov.br/ccivil_03/)
            - [gov.br Serviços](https://www.gov.br/pt-br/servicos)
            - [INSS](https://meu.inss.gov.br/)

            _Esta issue foi criada automaticamente pelo workflow de deploy._`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['validação', 'fontes']
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['validação', 'fontes', 'automated']
              });
            }

  # ── Auto-tag (cria tag vX.Y.Z em main após deploy bem-sucedido) ──
  auto-tag:
    needs: deploy
    runs-on: ubuntu-latest
    name: Auto Tag Release
    if: needs.deploy.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          fetch-depth: 0

      - name: Criar tag se ainda não existir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(jq -r .version package.json)"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "✅ Tag $VERSION já existe — nada a fazer."
            exit 0
          fi
          echo "🏷️  Criando tag $VERSION em $(git rev-parse HEAD)..."
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION (auto-tag pós-deploy)"
          git push origin "$VERSION"
          echo "✅ Tag $VERSION publicada."
