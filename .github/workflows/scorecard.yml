name: OpenSSF Scorecard

# Avalia postura de segurança do repositório segundo o framework OpenSSF.
# Gera badge público e relatório SARIF.
# Docs: https://github.com/ossf/scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 0" # semanal, domingo 06:00 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF
      id-token: write        # OIDC para publishing
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: SARIF
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # v4
        with:
          sarif_file: results.sarif
