# OpenSSF Scorecard — métrica pública de saúde de supply chain
#
# Avalia o repo em ~18 dimensões (signed releases, branch protection,
# token permissions, pinned deps, etc.) e publica resultado em
# https://scorecard.dev. Resultado também sobe pra Security tab via SARIF.
#
# Docs: https://github.com/ossf/scorecard-action
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 7 * * 1" # Segunda 07:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write # upload SARIF
      id-token: write # publicação em scorecard.dev
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true # vai para scorecard.dev

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 30

      - name: Upload to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: results.sarif
