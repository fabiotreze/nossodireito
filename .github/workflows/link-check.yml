name: Link Freshness (lychee)

# Verifica saúde de URLs externas (especialmente gov.br) referenciadas no
# conteúdo, evitando que o usuário caia em link quebrado. Roda semanalmente
# e em PRs que mexem em conteúdo de direitos.
on:
  schedule:
    - cron: "0 6 * * 1" # Segunda 06:00 UTC (03:00 BRT)
  workflow_dispatch:
  pull_request:
    paths:
      - "direitos/**/*.html"
      - "direitos/**/*.json"
      - "data/**/*.json"
      - "docs/**/*.md"
      - "README.md"
      - ".github/workflows/link-check.yml" # self-test em alterações do workflow

# Único job paralelo por branch.
concurrency:
  group: lychee-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write # cria/atualiza issue tracking de links quebrados
  pull-requests: write # comentar resumo em PRs

jobs:
  link-check:
    name: Check external links
    runs-on: ubuntu-latest
    # PRs que mexem em data/direitos.json podem expandir o escopo para centenas
    # de URLs externas (gov.br, planalto, OMS). Com --max-concurrency 2 (gentil
    # com servidores gov) e --retry-wait-time 10, 20min era insuficiente e
    # gerava cancelamentos sistemáticos. 45min absorve esse pico mantendo
    # margem de segurança para o agendamento semanal full-repo.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # PR mode usa git diff origin/<base>...HEAD → precisa do histórico
          # completo. Repo é pequeno (~5MB), full clone é trivial.
          # Schedule/dispatch escaneia repo inteiro → depth=1 basta, mas
          # mantemos 0 para simplicidade (não há custo perceptível).
          fetch-depth: 0

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          # Cache estável: rehidrata entre runs enquanto o conjunto de URLs não muda.
          # Antes usava ${{ github.run_id }} (único por run) -> cache nunca tinha hit.
          key: lychee-${{ hashFiles('data/direitos.json', 'direitos/**/*.html', 'docs/**/*.md', 'README.md') }}
          restore-keys: |
            lychee-

      - name: Extrair URLs voláteis (schema estabilidade=volatil)
        run: node scripts/extract_volatil_urls.mjs

      - name: Compute scan scope (diff-only em PR; repo inteiro em cron/dispatch)
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            # Lychee gov.br + ~470 arquivos = timeout >20min. Em PRs, escaneamos
            # apenas o que o PR mudou (paths relevantes ao link-check).
            # (fetch-depth=0 no checkout garante que origin/${BASE_REF} já existe localmente)
            changed_workflow="false"
            if git diff --name-only "origin/${BASE_REF}...HEAD" \
                | grep -qx '.github/workflows/link-check.yml'; then
              changed_workflow="true"
            fi
            mapfile -t files < <(
              git diff --name-only --diff-filter=ACMR "origin/${BASE_REF}...HEAD" -- \
                'direitos/**' 'data/**' 'docs/**' '*.md' \
                2>/dev/null \
                | grep -E '\.(html|md|json)$' \
                | grep -Ev '^(node_modules|terraform|\.venv|\.git)/' \
                || true
            )
            if [ "${#files[@]}" -eq 0 ] && [ "${changed_workflow}" = "true" ]; then
              # PR mexe só no workflow → smoke-test em README.md para validar pipeline.
              echo "ℹ️ Só o workflow link-check.yml mudou — smoke-test em README.md."
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "files=./README.md" >> "$GITHUB_OUTPUT"
            elif [ "${#files[@]}" -eq 0 ]; then
              echo "ℹ️ Nenhum arquivo relevante alterado neste PR — skip lychee."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "files=" >> "$GITHUB_OUTPUT"
            else
              echo "ℹ️ ${#files[@]} arquivo(s) alterado(s) para escanear:"
              printf '  - %s\n' "${files[@]}"
              # Lychee aceita paths como args posicionais (separados por espaço).
              # Repo não tem espaços em nomes — concat seguro.
              joined=""
              for f in "${files[@]}"; do joined+=" ./${f}"; done
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "files=${joined# }" >> "$GITHUB_OUTPUT"
            fi
          else
            # Cron semanal / workflow_dispatch → repo inteiro.
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "files=./**/*.html ./**/*.md ./data/**/*.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lychee
        id: lychee
        if: steps.scope.outputs.skip != 'true'
        uses: lycheeverse/lychee-action@v2
        with:
          # --cache evita marteladas em gov.br em runs sucessivos
          # --max-concurrency 2 é gentil com servidores gov.br (alguns rate-limitam agressivo)
          # --exclude-loopback / --exclude-private remove ruído (mailto excluído por padrão em lychee v0.23+)
          # --accept 200..=299,403,429 evita falso-positivo em sites que bloqueiam HEAD
          # Exclusões de URL ficam em .lycheeignore (descoberto automaticamente):
          #   - hosts gov.br (planalto/in) bloqueiam IPs de cloud; validados por
          #     scripts/validate_legal_sources.py no Quality Gate (path independente
          #     de HTTP-ping). Ver .lycheeignore para contexto completo.
          #   - URLs voláteis (schema estabilidade=volatil) são ANEXADAS dinamicamente
          #     ao .lycheeignore pelo step "Extrair URLs voláteis".
          args: >-
            --cache
            --max-cache-age 7d
            --max-concurrency 2
            --max-redirects 5
            --timeout 30
            --retry-wait-time 10
            --exclude-loopback
            --exclude-private
            --accept 200..=299,403,405,429
            --exclude-path node_modules
            --exclude-path .git
            --exclude-path terraform
            ${{ steps.scope.outputs.files }}
          # Em PRs → falha o check (bloqueia merge se PR introduzir URL quebrada).
          # Em schedule/dispatch → fail:false e abre issue tracker (caça link-rot semanal).
          fail: ${{ github.event_name == 'pull_request' }}
          output: ./lychee-report.md

      - name: Upload report
        if: always() && steps.scope.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee-report.md
          retention-days: 30

      - name: Comentar resumo no PR (em failure)
        if: failure() && github.event_name == 'pull_request' && steps.scope.outputs.skip != 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ./lychee-report.md
          edit-mode: replace

      - name: Create or update tracker issue
        if: steps.lychee.outputs.exit_code != 0 && github.event_name != 'pull_request'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "[link-check] URLs quebradas detectadas"
          content-filepath: ./lychee-report.md
          labels: |
            broken-links
            content
