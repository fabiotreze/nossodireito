name: Link Freshness (lychee)

# Verifica saúde de URLs externas (especialmente gov.br) referenciadas no
# conteúdo, evitando que o usuário caia em link quebrado. Roda semanalmente
# e em PRs que mexem em conteúdo de direitos.
on:
  schedule:
    - cron: "0 6 * * 1" # Segunda 06:00 UTC (03:00 BRT)
  workflow_dispatch:
  pull_request:
    paths:
      - "direitos/**/*.html"
      - "direitos/**/*.json"
      - "data/**/*.json"
      - "docs/**/*.md"
      - "README.md"
      - ".github/workflows/link-check.yml" # self-test em alterações do workflow

# Único job paralelo por branch.
concurrency:
  group: lychee-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write # cria/atualiza issue tracking de links quebrados
  pull-requests: write # comentar resumo em PRs

jobs:
  link-check:
    name: Check external links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.run_id }}
          restore-keys: lychee-

      - name: Extrair URLs voláteis (schema estabilidade=volatil)
        run: node scripts/extract_volatil_urls.mjs

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --cache evita marteladas em gov.br em runs sucessivos
          # --max-concurrency 4 é gentil com servidores gov (alguns rate-limitam)
          # --exclude-mail / --exclude-loopback / --exclude-private remove ruído
          # --accept 200..=299,403,429 evita falso-positivo em sites que bloqueiam HEAD
          args: >-
            --cache
            --max-cache-age 7d
            --max-concurrency 4
            --max-redirects 5
            --timeout 20
            --retry-wait-time 5
            --exclude-mail
            --exclude-loopback
            --exclude-private
            --accept 200..=299,403,429
            --exclude-path node_modules
            --exclude-path .git
            --exclude-path terraform
            --exclude-file .lychee-exclude.txt
            './**/*.html'
            './**/*.md'
            './data/**/*.json'
          # Em PRs → falha o check (bloqueia merge se PR introduzir URL quebrada).
          # Em schedule/dispatch → fail:false e abre issue tracker (caça link-rot semanal).
          fail: ${{ github.event_name == 'pull_request' }}
          output: ./lychee-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee-report.md
          retention-days: 30

      - name: Comentar resumo no PR (em failure)
        if: failure() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ./lychee-report.md
          edit-mode: replace

      - name: Create or update tracker issue
        if: steps.lychee.outputs.exit_code != 0 && github.event_name != 'pull_request'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[link-check] URLs quebradas detectadas"
          content-filepath: ./lychee-report.md
          labels: |
            broken-links
            content
